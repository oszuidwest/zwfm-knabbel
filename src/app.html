<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <script>
      // Set the daisyUI theme before Svelte mounts to avoid a light/dark flash.
      ;(function () {
        const theme = window.matchMedia('(prefers-color-scheme: dark)').matches
          ? 'business'
          : 'corporate'
        document.documentElement.setAttribute('data-theme', theme)
        // Keep the theme aligned when the OS preference changes.
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
          document.documentElement.setAttribute('data-theme', e.matches ? 'business' : 'corporate')
        })
      })()
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
